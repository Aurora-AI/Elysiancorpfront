<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0A0A0A; font-family: 'Plus Jakarta Sans', sans-serif; }
.row { display: flex; height: 80px; }
.swatch { flex: 1; display: flex; align-items: flex-end; justify-content: space-between; padding: 10px 14px; }
.swatch-name { font-family: 'JetBrains Mono', monospace; font-size: 9px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(242,242,242,0.4); }
.swatch-hex { font-family: 'JetBrains Mono', monospace; font-size: 9px; font-weight: 500; letter-spacing: 0.08em; color: rgba(242,242,242,0.25); }
.label-row { display: flex; padding: 10px 14px 6px; background: #0A0A0A; }
.label-row span { font-family: 'JetBrains Mono', monospace; font-size: 9px; font-weight: 500; letter-spacing: 0.18em; text-transform: uppercase; color: rgba(242,242,242,0.3); }
</style>
</head><body>
<div class="label-row"><span>Dark World — Base Palette</span></div>
<div class="row">
  <div class="swatch" style="background:#000000; border: 1px solid #1a1a1a;">
    <span class="swatch-name">Absolute</span><span class="swatch-hex">#000000</span>
  </div>
  <div class="swatch" style="background:#0A0A0A;">
    <span class="swatch-name">Deep</span><span class="swatch-hex">#0A0A0A</span>
  </div>
  <div class="swatch" style="background:#0D0D0D;">
    <span class="swatch-name">Technical</span><span class="swatch-hex">#0D0D0D</span>
  </div>
  <div class="swatch" style="background:#1A1A1A;">
    <span class="swatch-name">Smoke</span><span class="swatch-hex">#1A1A1A</span>
  </div>
</div>
</body></html>
