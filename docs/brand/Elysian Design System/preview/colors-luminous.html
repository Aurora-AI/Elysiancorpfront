<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #F2F1ED; font-family: 'Plus Jakarta Sans', sans-serif; padding: 0; }
.row { display: flex; height: 80px; }
.swatch { flex: 1; display: flex; align-items: flex-end; justify-content: space-between; padding: 10px 14px; position: relative; }
.swatch-name { font-family: 'JetBrains Mono', monospace; font-size: 9px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; opacity: 0.55; }
.swatch-hex { font-family: 'JetBrains Mono', monospace; font-size: 9px; font-weight: 500; letter-spacing: 0.08em; opacity: 0.45; }
.label-row { display: flex; padding: 10px 14px 6px; background: #F2F1ED; }
.label-row span { font-family: 'JetBrains Mono', monospace; font-size: 9px; font-weight: 500; letter-spacing: 0.18em; text-transform: uppercase; color: #6B6B6B; }
</style>
</head><body>
<div class="label-row"><span>Luminous World — Base Palette</span></div>
<div class="row">
  <div class="swatch" style="background:#FFFFFF; border: 1px solid #E8E7E2;">
    <span class="swatch-name" style="color:#1A1A1A">Primary</span><span class="swatch-hex" style="color:#1A1A1A">#FFFFFF</span>
  </div>
  <div class="swatch" style="background:#F8F7F3;">
    <span class="swatch-name" style="color:#1A1A1A">Surface</span><span class="swatch-hex" style="color:#1A1A1A">#F8F7F3</span>
  </div>
  <div class="swatch" style="background:#F2F1ED;">
    <span class="swatch-name" style="color:#1A1A1A">Surface-2</span><span class="swatch-hex" style="color:#1A1A1A">#F2F1ED</span>
  </div>
  <div class="swatch" style="background:#E8E7E2;">
    <span class="swatch-name" style="color:#1A1A1A">Border</span><span class="swatch-hex" style="color:#1A1A1A">#E8E7E2</span>
  </div>
</div>
</body></html>
