<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;300;500;600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
@font-face { font-family: 'Lanche'; src: url('../fonts/Lanche_Demo.ttf') format('truetype'); font-display: swap; }
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #F8F7F3; font-family: 'Plus Jakarta Sans', sans-serif; padding: 20px 24px; }
.specimen { margin-bottom: 4px; line-height: 1; }
.meta { font-family: 'JetBrains Mono', monospace; font-size: 8.5px; font-weight: 500; letter-spacing: 0.14em; text-transform: uppercase; color: #9B9B9B; margin-bottom: 2px; }
.divider { height: 1px; background: #E8E7E2; margin: 12px 0; }
</style>
</head><body>
  <div class="meta">LANCHE — Brand Display / Hero Wordmark</div>
  <div class="specimen" style="font-family:'Lanche',sans-serif; font-size:clamp(52px,9vw,96px); color:#0A0A0A; letter-spacing:-0.02em; line-height:0.92;">ELYSIAN</div>

  <div class="divider"></div>

  <div class="meta">PLUS JAKARTA SANS 800 — Display-L / Product Headlines</div>
  <div class="specimen" style="font-size:26px; font-weight:800; letter-spacing:-0.03em; color:#0A0A0A; font-family:'Plus Jakarta Sans',sans-serif;">Inteligência comercial que age.</div>

  <div class="meta" style="margin-top:8px;">PLUS JAKARTA SANS 700 — Display</div>
  <div class="specimen" style="font-size:20px; font-weight:700; letter-spacing:-0.025em; color:#0A0A0A;">Precisão jurídica sem fricção.</div>
</body></html>
