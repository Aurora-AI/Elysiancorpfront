<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;600;700&family=JetBrains+Mono:wght@500&family=Crimson+Pro:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #F2F1ED; font-family: 'Plus Jakarta Sans', sans-serif; padding: 14px; }
.grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
.card { padding: 16px; }
.card-label { font-family: 'JetBrains Mono', monospace; font-size: 8px; font-weight: 500; letter-spacing: 0.16em; text-transform: uppercase; margin-bottom: 6px; }
.card-title { font-size: 15px; font-weight: 600; letter-spacing: -0.02em; line-height: 1.2; margin-bottom: 4px; }
.card-body { font-size: 11px; font-weight: 300; line-height: 1.55; }
</style>
</head><body>
<div class="grid">
  <!-- Brand card — luminous -->
  <div class="card" style="background:#F8F7F3; border:1px solid #E8E7E2;">
    <div class="card-label" style="color:#9B9B9B">Brand · Luminous</div>
    <div class="card-title" style="color:#0A0A0A;">Precisão jurídica sem fricção.</div>
    <div class="card-body" style="color:#6B6B6B;">0px radius · 1px border · no shadow</div>
  </div>
  <!-- CRM card — glass -->
  <div class="card" style="background:rgba(255,255,255,0.7); border-radius:24px; border:1px solid rgba(255,255,255,0.5); backdrop-filter:blur(12px); box-shadow:0 4px 24px rgba(15,23,42,0.06);">
    <div class="card-label" style="color:#9B9B9B">CRM Aurora · Glass</div>
    <div class="card-title" style="color:#31332e; font-family:'Plus Jakarta Sans',sans-serif;">Secretaria Executiva</div>
    <div class="card-body" style="color:#5e6059;">24px radius · backdrop blur · ring-1</div>
  </div>
  <!-- Lex card — sovereign dark -->
  <div class="card" style="background:#000000; border:1px solid #fff;">
    <div class="card-label" style="color:rgba(242,242,242,0.35)">Elysian Lex · Sovereign</div>
    <div class="card-title" style="color:#fff; font-family:'Crimson Pro',Georgia,serif; font-style:italic; font-size:17px; letter-spacing:-0.01em;">IMMUTABLE IDENTITY</div>
    <div class="card-body" style="color:rgba(242,242,242,0.5);">0px radius · 1px white border · no shadow</div>
  </div>
</div>
</body></html>
