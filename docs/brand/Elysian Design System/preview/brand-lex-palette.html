<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,600;0,700;1,600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000000; font-family: 'JetBrains Mono', monospace; padding: 16px 20px; }
.label { font-size: 8px; font-weight: 500; letter-spacing: 0.16em; text-transform: uppercase; color: rgba(242,242,242,0.25); margin-bottom: 10px; }
.swatches { display: flex; gap: 0; height: 52px; margin-bottom: 12px; }
.swatch { flex: 1; display: flex; flex-direction: column; justify-content: flex-end; padding: 6px 10px; border: 1px solid rgba(255,255,255,0.05); }
.swatch-name { font-size: 7.5px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; opacity: 0.35; }
.principles { display: flex; gap: 12px; align-items: flex-start; }
.principle { font-size: 8px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; padding: 4px 10px; border: 1px solid; }
.quote { font-family: 'Crimson Pro', Georgia, serif; font-style: italic; font-size: 16px; color: rgba(242,242,242,0.85); line-height: 1.4; margin-bottom: 10px; letter-spacing: -0.01em; }
</style>
</head><body>
  <div class="label">Elysian Lex — Sovereign Dark Palette</div>
  <div class="swatches">
    <div class="swatch" style="background:#000000; border-color:rgba(255,255,255,0.15)"><span class="swatch-name" style="color:#F2F2F2;">Stark #000</span></div>
    <div class="swatch" style="background:#1A1A1A;"><span class="swatch-name" style="color:#F2F2F2;">Noise #1A1A1A</span></div>
    <div class="swatch" style="background:#F2F2F2;"><span class="swatch-name" style="color:#000;">White #F2F2F2</span></div>
    <div class="swatch" style="background:#93C5FD;"><span class="swatch-name" style="color:#000;">Audit #93C5FD</span></div>
  </div>
  <div class="quote">"The ledger is not a record of the past; it is the constraint of the future."</div>
  <div class="principles">
    <span class="principle" style="border-color:rgba(242,242,242,0.2); color:rgba(242,242,242,0.5);">No border-radius &gt; 2px</span>
    <span class="principle" style="border-color:rgba(242,242,242,0.2); color:rgba(242,242,242,0.5);">No shadows</span>
    <span class="principle" style="border-color:rgba(242,242,242,0.2); color:rgba(242,242,242,0.5);">No gradients</span>
    <span class="principle" style="border-color:rgba(147,197,253,0.4); color:rgba(147,197,253,0.9);">Pastel Blue only accent</span>
  </div>
</body></html>
