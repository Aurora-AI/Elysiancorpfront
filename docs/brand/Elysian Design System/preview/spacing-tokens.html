<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #F8F7F3; font-family: 'Plus Jakarta Sans', sans-serif; padding: 16px 20px; }
.row { display: flex; align-items: center; gap: 0; margin-bottom: 6px; }
.bar { height: 8px; background: #0A0A0A; border-radius: 1px; margin-right: 10px; flex-shrink: 0; }
.name { font-family: 'JetBrains Mono', monospace; font-size: 8px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: #9B9B9B; width: 40px; flex-shrink: 0; }
.val { font-family: 'JetBrains Mono', monospace; font-size: 8px; letter-spacing: 0.1em; color: #C0C0B8; }
.head { font-family: 'JetBrains Mono', monospace; font-size: 8.5px; font-weight: 500; letter-spacing: 0.18em; text-transform: uppercase; color: #9B9B9B; margin-bottom: 10px; }
</style>
</head><body>
  <div class="head">Spacing Scale — 8px baseline</div>
  <div class="row"><div class="name">sp-1</div><div class="bar" style="width:4px;"></div><div class="val">4px</div></div>
  <div class="row"><div class="name">sp-2</div><div class="bar" style="width:8px;"></div><div class="val">8px</div></div>
  <div class="row"><div class="name">sp-3</div><div class="bar" style="width:16px;"></div><div class="val">16px</div></div>
  <div class="row"><div class="name">sp-4</div><div class="bar" style="width:24px;"></div><div class="val">24px</div></div>
  <div class="row"><div class="name">sp-5</div><div class="bar" style="width:40px;"></div><div class="val">40px</div></div>
  <div class="row"><div class="name">sp-6</div><div class="bar" style="width:64px;"></div><div class="val">64px</div></div>
  <div class="row"><div class="name">sp-7</div><div class="bar" style="width:96px;"></div><div class="val">96px</div></div>
  <div class="row"><div class="name">sp-8</div><div class="bar" style="width:128px;"></div><div class="val">128px</div></div>
</body></html>
