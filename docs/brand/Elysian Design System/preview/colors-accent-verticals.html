<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #F8F7F3; font-family: 'Plus Jakarta Sans', sans-serif; padding: 16px; }
.row { display: flex; gap: 10px; }
.swatch { flex: 1; padding: 16px 14px 12px; border-radius: 2px; }
.label { font-family: 'JetBrains Mono', monospace; font-size: 8.5px; font-weight: 500; letter-spacing: 0.14em; text-transform: uppercase; margin-bottom: 6px; }
.hex { font-family: 'JetBrains Mono', monospace; font-size: 8.5px; opacity: 0.5; margin-bottom: 4px; }
.desc { font-size: 10px; font-weight: 300; opacity: 0.6; }
.pill { display: inline-block; padding: 2px 8px; border-radius: 2px; font-size: 9px; font-weight: 700; font-family: 'JetBrains Mono', monospace; letter-spacing: 0.12em; text-transform: uppercase; margin-top: 6px; }
</style>
</head><body>
<div class="row">
  <div class="swatch" style="background:#F5EED8; border:1px solid #E8DCC0;">
    <div class="label" style="color:#5c4a1e">Pergaminho</div>
    <div class="hex" style="color:rgba(92,74,30,0.5)">#F5EED8</div>
    <div class="desc" style="color:rgba(92,74,30,0.6)">Superfície quente principal</div>
  </div>
  <div class="swatch" style="background:#E2D0A8; border:1px solid #C9B87A;">
    <div class="label" style="color:#4a3810">Pergaminho Mid</div>
    <div class="hex" style="color:rgba(74,56,16,0.5)">#E2D0A8</div>
    <div class="desc" style="color:rgba(74,56,16,0.6)">Ênfase e bordas</div>
  </div>
  <div class="swatch" style="background:#BFDBFE; border:1px solid #93C5FD;">
    <div class="label" style="color:#1e40af">Pastel Blue</div>
    <div class="hex" style="color:rgba(30,64,175,0.5)">#BFDBFE</div>
    <div class="desc" style="color:rgba(30,64,175,0.6)">Suporte / fundo sutil</div>
  </div>
  <div class="swatch" style="background:#93C5FD; border:1px solid #60A5FA;">
    <div class="label" style="color:#1e3a8a">Blue Mid</div>
    <div class="hex" style="color:rgba(30,58,138,0.5)">#93C5FD</div>
    <div class="desc" style="color:rgba(30,58,138,0.6)">Ênfase suave</div>
  </div>
  <div class="swatch" style="background:#000000; border:1px solid #1a1a1a;">
    <div class="label" style="color:#F2F2F2">Branco no Preto</div>
    <div class="hex" style="color:rgba(242,242,242,0.35)">#F2F2F2</div>
    <div class="pill" style="background:rgba(242,242,242,0.08); color:#F2F2F2; border:1px solid rgba(242,242,242,0.2);">On Dark</div>
  </div>
</div>
</body></html>
