<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
@font-face { font-family: 'Lanche'; src: url('../fonts/Lanche_Demo.ttf') format('truetype'); font-display: swap; }
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #E8E7E2; font-family: 'Plus Jakarta Sans', sans-serif; }
.worlds { display: grid; grid-template-columns: 1fr 1fr; }
.world { padding: 24px 28px 20px; }
.meta { font-family: 'JetBrains Mono', monospace; font-size: 8px; font-weight: 500; letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 12px; opacity: 0.4; }
.wordmark-brand { font-family: 'Lanche', sans-serif; letter-spacing: -0.01em; line-height: 0.92; }
.sub { font-family: 'JetBrains Mono', monospace; font-size: 9px; font-weight: 500; letter-spacing: 0.16em; text-transform: uppercase; margin-top: 10px; opacity: 0.4; }
</style>
</head><body>
<div class="worlds">
  <div class="world" style="background:#F8F7F3;">
    <div class="meta" style="color:#0A0A0A;">Luminous World — Hero Display</div>
    <div class="wordmark-brand" style="font-size:52px; color:#0A0A0A;">ELYSIAN</div>
    <div class="sub" style="color:#0A0A0A;">Lanche / -0.01em / hero scale</div>
  </div>
  <div class="world" style="background:#000000;">
    <div class="meta" style="color:#F2F2F2;">Dark World — Navigation</div>
    <div class="wordmark-brand" style="font-size:26px; font-weight:600; color:#F2F2F2; font-family:'Plus Jakarta Sans',sans-serif; letter-spacing:-0.01em;">ELYSIAN</div>
    <div class="sub" style="color:#F2F2F2;">Plus Jakarta Sans 600 / nav size</div>
    <div style="margin-top:12px; font-family:'JetBrains Mono',monospace; font-size:9px; letter-spacing:0.18em; text-transform:uppercase; color:rgba(201,147,58,0.9);">VERTICAL: LEX</div>
  </div>
</div>
</body></html>
