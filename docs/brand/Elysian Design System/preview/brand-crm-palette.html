<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #fbf9f5; font-family: 'Plus Jakarta Sans', sans-serif; padding: 16px 20px; }
.label { font-family: 'JetBrains Mono', monospace; font-size: 8px; font-weight: 500; letter-spacing: 0.16em; text-transform: uppercase; color: rgba(94,96,89,0.6); margin-bottom: 10px; }
.swatches { display: flex; gap: 0; height: 56px; margin-bottom: 12px; }
.swatch { flex: 1; display: flex; flex-direction: column; justify-content: flex-end; padding: 6px 10px; }
.swatch-name { font-family: 'JetBrains Mono', monospace; font-size: 7.5px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; opacity: 0.45; }
.accents { display: flex; gap: 8px; align-items: center; }
.accent-chip { padding: 5px 12px; font-family: 'JetBrains Mono', monospace; font-size: 8.5px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; }
</style>
</head><body>
  <div class="label">CRM Aurora — Warm Editorial Palette</div>
  <div class="swatches">
    <div class="swatch" style="background:#fbf9f5; border:1px solid rgba(177,179,171,0.2);"><span class="swatch-name" style="color:#31332e;">Paper #fbf9f5</span></div>
    <div class="swatch" style="background:#f5f4ee;"><span class="swatch-name" style="color:#31332e;">Surface #f5f4ee</span></div>
    <div class="swatch" style="background:#efeee8;"><span class="swatch-name" style="color:#31332e;">Surface-2 #efeee8</span></div>
    <div class="swatch" style="background:#31332e;"><span class="swatch-name" style="color:rgba(245,244,238,0.5);">Text #31332e</span></div>
    <div class="swatch" style="background:#5e6059;"><span class="swatch-name" style="color:rgba(245,244,238,0.5);">Mid #5e6059</span></div>
  </div>
  <div class="accents">
    <div class="accent-chip" style="background:#535f6f; color:#f5f8ff;">Steel #535f6f</div>
    <div class="accent-chip" style="background:#984731; color:#fff7f6;">Rust #984731</div>
    <div class="accent-chip" style="background:#041627; color:#F2F2F2;">Navy #041627</div>
    <div class="accent-chip" style="background:#0369a1; color:#fff;">Sky #0369a1</div>
    <div style="font-family:'JetBrains Mono',monospace; font-size:8px; color:rgba(94,96,89,0.5); letter-spacing:0.1em; text-transform:uppercase; margin-left:4px;">CRM Backoffice only</div>
  </div>
</body></html>
