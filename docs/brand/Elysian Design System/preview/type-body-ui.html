<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;300;500;600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #F8F7F3; font-family: 'Plus Jakarta Sans', sans-serif; padding: 18px 24px; }
.row { display: flex; gap: 0; margin-bottom: 2px; align-items: baseline; }
.label { font-family: 'JetBrains Mono', monospace; font-size: 8px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: #B0B0A8; width: 120px; flex-shrink: 0; padding-top: 2px; }
.specimen { color: #0A0A0A; }
</style>
</head><body>
  <div class="row">
    <span class="label">Headline 600</span>
    <span class="specimen" style="font-size:26px; font-weight:600; letter-spacing:-0.02em;">Dê superpoderes ao humano.</span>
  </div>
  <div class="row">
    <span class="label">Subheadline 500</span>
    <span class="specimen" style="font-size:18px; font-weight:500; letter-spacing:-0.01em; color:#1A1A1A;">A IA nunca é o produto. O humano elevado é.</span>
  </div>
  <div class="row" style="margin-top:4px;">
    <span class="label">Body-L 300</span>
    <span class="specimen" style="font-size:15px; font-weight:300; line-height:1.7; color:#1A1A1A;">Reduz em 70% o tempo de resposta comercial. Confiança e empatia não são valores de parede — são requisitos de design.</span>
  </div>
  <div class="row" style="margin-top:4px;">
    <span class="label">Body 300</span>
    <span class="specimen" style="font-size:13px; font-weight:300; line-height:1.65; color:#1A1A1A;">A Elysian é o mentor. O cliente é sempre o herói.</span>
  </div>
</body></html>
